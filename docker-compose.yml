services:
  postgres:
    image: postgres:16-alpine
    container_name: ivoverflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ivoverflow
      POSTGRES_PASSWORD: ivoverflow
      POSTGRES_DB: ivoverflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivoverflow -d ivoverflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
